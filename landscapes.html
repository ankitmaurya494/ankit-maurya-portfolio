<!DOCTYPE html>
<html lang="en">
<head>

    <title>Landscapes - Photography Portfolio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" href="assets/css/gallery.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <h1>Photography Portfolio</h1>
            </div>
            <ul class="navbar-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>

    <!-- Landscapes Section -->
    <section class="gallery-section">
        <div class="container">
            <h1>Landscape Photography</h1>
            <p class="intro-text">Stunning natural scenery captured with passion, showcasing the beauty of our world</p>

            <!-- Gallery Grid -->
            <div class="gallery-grid">
                <div class="gallery-item" data-category="landscape">
                    <img src="assets/images/landscape/pexels-allen-boguslavsky-1344061-19329957.jpg" alt="Landscape">
                    <div class="gallery-overlay">
                        <button class="view-btn">View</button>
                    </div>
                </div>
                <div class="gallery-item" data-category="landscape">
                    <img src="assets/images/landscape/pexels-axp-photography-500641970-16534748.jpg" alt="Landscape">
                    <div class="gallery-overlay">
                        <button class="view-btn">View</button>
                    </div>
                </div>
                <div class="gallery-item" data-category="landscape">
                    <img src="assets/images/landscape/pexels-jeswin-3037096.jpg" alt="Landscape">
                    <div class="gallery-overlay">
                        <button class="view-btn">View</button>
                    </div>
                </div>
                <div class="gallery-item" data-category="landscape">
                    <img src="assets/images/landscape/pexels-joshkjack-135018.jpg" alt="Landscape">
                    <div class="gallery-overlay">
                        <button class="view-btn">View</button>
                    </div>
                </div>
                <div class="gallery-item" data-category="landscape">
                    <img src="assets/images/landscape/pexels-shashank3240-5438965.jpg" alt="Landscape">
                    <div class="gallery-overlay">
                        <button class="view-btn">View</button>
                    </div>
                </div>
                <div class="gallery-item" data-category="landscape">
                    <img src="assets/images/landscape/pexels-virgovoice-33024243.jpg" alt="Landscape">
                    <div class="gallery-overlay">
                        <button class="view-btn">View</button>
                    </div>
                </div>
            </div>

            <div class="back-to-gallery">
                <a href="gallery.html" class="secondary-button">← Back to Full Gallery</a>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-image" src="" alt="">
        <div class="lightbox-controls">
            <button class="prev">&#10094;</button>
            <button class="next">&#10095;</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Photography Portfolio. All rights reserved.</p>
            <div class="social-links">
